name: flutter_network_throttler
description: "Simulate slow, unreliable, or failing network conditions in Flutter apps to test loading, timeout, and error states."
version: 1.1.0
homepage: https://github.com/firaskola/flutter_network_throttler
repository: https://github.com/firaskola/flutter_network_throttler
issue_tracker: https://github.com/firaskola/flutter_network_throttler/issues

topics:
  - network
  - testing
  - http
  - dio
  - simulation

screenshots:
  - description: "The Network Throttler control panel: presets, condition sliders, failure injection, per-endpoint rules, and a live request log."
    path: doc/panel.png

environment:
  sdk: ^3.8.0
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.15.0
  http: ^1.2.0
  dio: ^5.7.0
  web_socket_channel: ^3.0.0
  stream_channel: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_async: ^1.3.1

flutter:
